<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" role="img" aria-label="NAVLYS — winch de commande">
  <title>NAVLYS — Winch (commande d'allocation / réaffectation)</title>
  <defs>
    <radialGradient id="drum" cx="38%" cy="32%" r="70%">
      <stop offset="0" stop-color="#f6d6ad"/><stop offset=".45" stop-color="#D49B5B"/><stop offset=".8" stop-color="#B87333"/><stop offset="1" stop-color="#5c3514"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7DD3FC" stop-opacity=".35"/><stop offset="1" stop-color="#7DD3FC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rope" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e7c79a"/><stop offset="1" stop-color="#8a5a2c"/></linearGradient>
  </defs>
  <rect width="260" height="260" fill="#0B1220" rx="18"/>
  <circle cx="130" cy="120" r="100" fill="url(#halo)"/>
  <!-- rope coiled -->
  <g fill="none" stroke="url(#rope)" stroke-width="9" stroke-linecap="round" opacity=".9">
    <path d="M40,210 C70,150 110,150 130,120"/>
    <circle cx="130" cy="120" r="78"/>
    <circle cx="130" cy="120" r="66"/>
  </g>
  <!-- drum body -->
  <circle cx="130" cy="120" r="58" fill="url(#drum)" stroke="#3a2207" stroke-width="3"/>
  <circle cx="130" cy="120" r="58" fill="none" stroke="#f0c79a" stroke-width="1.5" opacity=".5"/>
  <!-- top cap with grip notches -->
  <circle cx="130" cy="120" r="40" fill="#2a1a0c"/>
  <g stroke="#D49B5B" stroke-width="3">
    <line x1="130" y1="84" x2="130" y2="98"/><line x1="130" y1="142" x2="130" y2="156"/>
    <line x1="94" y1="120" x2="108" y2="120"/><line x1="152" y1="120" x2="166" y2="120"/>
    <line x1="104" y1="94" x2="114" y2="104"/><line x1="146" y1="146" x2="156" y2="156"/>
    <line x1="156" y1="94" x2="146" y2="104"/><line x1="114" y1="146" x2="104" y2="156"/>
  </g>
  <circle cx="130" cy="120" r="14" fill="url(#drum)" stroke="#3a2207" stroke-width="2"/>
  <!-- handle -->
  <g stroke="#D49B5B" stroke-width="8" stroke-linecap="round">
    <line x1="130" y1="120" x2="196" y2="86"/>
  </g>
  <circle cx="196" cy="86" r="9" fill="url(#drum)" stroke="#3a2207" stroke-width="2"/>
  <text x="130" y="246" text-anchor="middle" fill="#7DD3FC" font-family="Georgia,serif" font-size="14" letter-spacing="2">WINCH · règle ton cap</text>
</svg>
