<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320" role="img" aria-label="NAVLYS — rotor Flettner animé">
  <title>NAVLYS — Rotor Flettner (la curation, l'œil qui veille)</title>
  <defs>
    <radialGradient id="haloR" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#7DD3FC" stop-opacity=".30"/><stop offset="1" stop-color="#7DD3FC" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="cyl"><rect x="62" y="40" width="76" height="230" rx="38"/></clipPath>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8a5a2c"/><stop offset=".5" stop-color="#f0c79a"/><stop offset="1" stop-color="#8a5a2c"/></linearGradient>
  </defs>
  <rect width="200" height="320" fill="#0B1220" rx="16"/>
  <ellipse cx="100" cy="150" rx="90" ry="150" fill="url(#haloR)"/>
  <!-- body -->
  <rect x="62" y="40" width="76" height="230" rx="38" fill="#13203a" stroke="#D49B5B" stroke-width="3"/>
  <!-- spinning stripes -->
  <g clip-path="url(#cyl)">
    <g>
      <rect x="62" y="-20" width="76" height="40" fill="#D49B5B" opacity=".88"/>
      <rect x="62" y="20"  width="76" height="40" fill="#0e1a30" opacity=".88"/>
      <rect x="62" y="60"  width="76" height="40" fill="#D49B5B" opacity=".88"/>
      <rect x="62" y="100" width="76" height="40" fill="#0e1a30" opacity=".88"/>
      <rect x="62" y="140" width="76" height="40" fill="#D49B5B" opacity=".88"/>
      <rect x="62" y="180" width="76" height="40" fill="#0e1a30" opacity=".88"/>
      <rect x="62" y="220" width="76" height="40" fill="#D49B5B" opacity=".88"/>
      <rect x="62" y="260" width="76" height="40" fill="#0e1a30" opacity=".88"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 80" dur="2.4s" repeatCount="indefinite"/>
    </g>
  </g>
  <!-- cylinder side shading -->
  <rect x="62" y="40" width="20" height="230" rx="10" fill="#000" opacity=".22"/>
  <rect x="118" y="40" width="20" height="230" rx="10" fill="#fff" opacity=".06"/>
  <!-- caps -->
  <ellipse cx="100" cy="40" rx="38" ry="11" fill="url(#rim)"/>
  <ellipse cx="100" cy="270" rx="38" ry="11" fill="#1c0f06"/>
  <text x="100" y="300" text-anchor="middle" fill="#7DD3FC" font-family="Georgia,serif" font-size="14" letter-spacing="2">Flettner · la curation</text>
</svg>
