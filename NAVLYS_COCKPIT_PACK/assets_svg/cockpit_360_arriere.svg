<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-label="Cockpit NAVLYS — vue arrière (le sillage)">
  <title>Cockpit NAVLYS — vue ARRIÈRE : le sillage, les résultats, le passé</title>
  <defs>
    <linearGradient id="skyB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#16243f"/><stop offset=".5" stop-color="#0a1428"/><stop offset="1" stop-color="#050b16"/></linearGradient>
    <linearGradient id="seaB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a2036"/><stop offset="1" stop-color="#01060d"/></linearGradient>
    <linearGradient id="wakeB" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0" stop-color="#7DD3FC" stop-opacity="0"/><stop offset="1" stop-color="#7DD3FC" stop-opacity=".30"/></linearGradient>
    <linearGradient id="sailB" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef3f9"/><stop offset="1" stop-color="#c0ccdb"/></linearGradient>
    <linearGradient id="mastB" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6e3f17"/><stop offset=".5" stop-color="#D49B5B"/><stop offset="1" stop-color="#6e3f17"/></linearGradient>
    <linearGradient id="woodB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5a3a1f"/><stop offset="1" stop-color="#1c0f06"/></linearGradient>
  </defs>
  <rect width="1000" height="330" fill="url(#skyB)"/>
  <rect y="330" width="1000" height="270" fill="url(#seaB)"/>
  <g fill="#cfe6ff" opacity=".8"><circle cx="160" cy="60" r="1.2"/><circle cx="700" cy="70" r="1.3"/><circle cx="900" cy="56" r="1.1"/></g>
  <line x1="0" y1="330" x2="1000" y2="330" stroke="rgba(125,211,252,.3)"/>
  <!-- wake widening toward viewer -->
  <path d="M500,330 L760,600 L240,600 Z" fill="url(#wakeB)"/>
  <path d="M500,330 L600,600 M500,330 L400,600 M500,330 L700,600 M500,330 L300,600" stroke="rgba(125,211,252,.18)" stroke-width="1.5" fill="none"/>
  <!-- equity curve (illustrative) -->
  <polyline points="120,430 220,415 320,420 420,388 520,360 620,372 720,330 820,300" fill="none" stroke="#7DD3FC" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <polyline points="120,470 120,430 220,415 320,420 420,388 520,360 620,372 720,330 820,300 820,470" fill="rgba(125,211,252,.10)" stroke="none"/>
  <text x="500" y="80" text-anchor="middle" fill="#7DD3FC" font-family="Georgia,serif" font-size="15" letter-spacing="3">TON SILLAGE · TES RÉSULTATS</text>
  <!-- artimon prominent 10% -->
  <g transform="translate(500,40)">
    <rect x="-5" y="0" width="10" height="260" fill="url(#mastB)"/>
    <path d="M0,14 C58,60 72,170 40,252 L0,252 Z" fill="url(#sailB)"/>
    <path d="M0,34 C-46,74 -58,176 -30,252 L0,252 Z" fill="url(#sailB)" opacity=".85"/>
    <text x="20" y="150" fill="#7DD3FC" font-family="Georgia,serif" font-size="16">10%</text>
  </g>
  <path d="M-40,600 C200,480 800,480 1040,600 Z" fill="url(#woodB)"/>
  <path d="M-40,600 C200,480 800,480 1040,600" fill="none" stroke="#D49B5B" stroke-width="3" opacity=".7"/>
  <text x="500" y="585" text-anchor="middle" fill="#D49B5B" font-family="Georgia,serif" font-size="13" letter-spacing="2">ARRIÈRE — le sillage, le passé, le chemin parcouru</text>
</svg>
