<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NAVLYS — Bientôt à bord</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Fraunces:ital@1&family=Lora&display=swap" rel="stylesheet">
<style>
:root{--noir:#05060a;--ice:#7DD3FC;--or:#e9d3a0;--vin:#7a1f2b;--perle:#eef0f6;--mut:#9fb3c8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lora',serif;color:var(--perle);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:left;padding:30px;background:
 radial-gradient(820px 560px at 86% -8%,rgba(233,211,160,.12),transparent 60%),
 radial-gradient(760px 560px at 5% 6%,rgba(125,211,252,.12),transparent 60%),
 radial-gradient(1000px 820px at 50% 122%,rgba(122,31,43,.36),transparent 64%),var(--noir)}
.box{max-width:560px}
.led{width:15px;height:15px;border-radius:50%;background:radial-gradient(circle at 50% 40%,#bdf3ff,var(--ice) 60%,rgba(125,211,252,.1));box-shadow:0 0 18px var(--ice);animation:b 4.6s ease-in-out infinite;margin-bottom:18px}
@keyframes b{0%,100%{opacity:.5;transform:scale(.85)}50%{opacity:1;transform:scale(1.18)}}
h1{font-family:'Cormorant Garamond';font-weight:700;color:#fff;font-size:clamp(2rem,7vw,3rem);line-height:1.08}
p{color:var(--mut);font-family:'Fraunces';font-style:italic;margin:14px 0 24px;font-size:1.1rem}
a.cta{display:inline-block;color:#05060a;background:linear-gradient(100deg,var(--or),#fff6df);text-decoration:none;border-radius:999px;padding:11px 22px;font-weight:600}
.flag{letter-spacing:3px;margin-top:26px;color:#8fa6c8;font-size:.85rem}
/* ── Compte à rebours ── */
.cd{display:flex;gap:10px;margin:6px 0 26px;flex-wrap:wrap}
.cd .u{min-width:74px;flex:1;background:rgba(125,211,252,.06);border:1px solid rgba(125,211,252,.22);
  border-radius:14px;padding:12px 8px;text-align:center}
.cd .n{font-family:'Cormorant Garamond';font-weight:700;color:#fff;font-size:clamp(1.8rem,6vw,2.4rem);line-height:1}
.cd .l{color:var(--or);font-size:.7rem;letter-spacing:2px;text-transform:uppercase;margin-top:6px}
.when{color:#8fa6c8;font-size:.82rem;margin:-8px 0 22px;letter-spacing:.3px}
.live0{color:var(--or);font-family:'Fraunces';font-style:italic;font-size:1.25rem;margin:10px 0 22px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}}
</style>
</head>
<body>
<div class="box">
  <div class="led"></div>
  <h1>Cette branche arrive bientôt.</h1>
  <p>Elle grandit déjà dans le CORE. Lancement officiel :</p>

  <div class="cd" id="cd" aria-label="Compte à rebours avant le lancement">
    <div class="u"><div class="n" id="d">--</div><div class="l">jours</div></div>
    <div class="u"><div class="n" id="h">--</div><div class="l">heures</div></div>
    <div class="u"><div class="n" id="m">--</div><div class="l">min</div></div>
    <div class="u"><div class="n" id="s">--</div><div class="l">sec</div></div>
  </div>
  <div class="when">🗓️ 1er août 2026 à 23:59:59 (heure de Paris)</div>

  <a class="cta" href="/">‹ Retour à l'univers NAVLYS</a>
  <div class="flag">🌊 ⚓ NAVLYS 🪝</div>
</div>

<script>
// Cible : 1er août 2026, 23:59:59 — heure de Paris (UTC+2 en été).
var TARGET = new Date('2026-08-01T23:59:59+02:00').getTime();
function pad(n){ return (n<10?'0':'')+n; }
function tick(){
  var diff = TARGET - Date.now();
  if(diff <= 0){
    document.getElementById('cd').outerHTML =
      '<div class="live0">🚀 C\'est lancé — bienvenue à bord de NAVLYS.</div>';
    return; // on arrête le compteur
  }
  var s = Math.floor(diff/1000);
  var d = Math.floor(s/86400); s -= d*86400;
  var h = Math.floor(s/3600);  s -= h*3600;
  var m = Math.floor(s/60);    s -= m*60;
  document.getElementById('d').textContent = d;
  document.getElementById('h').textContent = pad(h);
  document.getElementById('m').textContent = pad(m);
  document.getElementById('s').textContent = pad(s);
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
