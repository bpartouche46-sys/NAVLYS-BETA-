<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>NAVLYS Next Gen — Écris ta vie</title>
<script>document.documentElement.className+=' nav-js';</script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Fraunces:ital,wght@1,400;1,500&family=Lora&display=swap" rel="stylesheet">
<style>
  :root{
    --noir:#04060a; --ice:#7DD3FC; --ice-soft:#bfe9ff; --or:#e9d3a0; --or-soft:#f6eccf;
    --perle:#eef0f6; --mut:#9fb3c8; --line:#1b2740;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--noir);color:var(--perle);font-family:'Lora',serif;-webkit-font-smoothing:antialiased}
  /* ── Écran cinéma : barres letterbox + grain + halo ── */
  body{min-height:100vh;position:relative;overflow-x:hidden}
  body::before,body::after{content:"";position:fixed;left:0;right:0;height:42px;z-index:40;pointer-events:none;
    background:linear-gradient(180deg,#000,rgba(0,0,0,0))}
  body::before{top:0}
  body::after{bottom:0;transform:rotate(180deg)}
  .stage{position:fixed;inset:0;z-index:-2;background:
    radial-gradient(900px 600px at 80% -10%,rgba(233,211,160,.12),transparent 60%),
    radial-gradient(820px 600px at 5% 10%,rgba(125,211,252,.12),transparent 60%),
    radial-gradient(1100px 900px at 50% 120%,rgba(122,31,43,.30),transparent 64%),var(--noir)}
  /* Emplacement vidéo cinéma (HeyGen/HK) — prêt à recevoir une vidéo de fond */
  .filmbg{position:fixed;inset:0;z-index:-1;opacity:.16;object-fit:cover;width:100%;height:100%;filter:saturate(1.1)}
  .wrap{max-width:760px;margin:0 auto;padding:78px 22px 90px;position:relative;z-index:1}
  /* ── Hero ── */
  .hero{text-align:center;padding:34px 0 30px}
  .kicker{letter-spacing:5px;text-transform:uppercase;font-size:.74rem;color:var(--or);opacity:.9}
  h1{font-family:'Cormorant Garamond';font-weight:700;font-size:clamp(2.3rem,8vw,4rem);line-height:1.04;color:#fff;margin:10px 0 8px}
  .sub{font-family:'Fraunces';font-style:italic;color:var(--mut);font-size:1.12rem;max-width:560px;margin:0 auto}
  .by{margin-top:14px;color:var(--ice);font-size:.92rem}
  /* ── Questions ── */
  .q{background:linear-gradient(180deg,rgba(13,20,34,.86),rgba(8,12,22,.86));border:1px solid var(--line);
    border-radius:16px;padding:18px 18px 14px;margin:16px 0;backdrop-filter:blur(3px)}
  .q .num{font-family:'Cormorant Garamond';font-weight:700;color:var(--or);font-size:1.1rem;margin-bottom:4px}
  .q .txt{font-family:'Cormorant Garamond';font-weight:600;color:#fff;font-size:1.32rem;line-height:1.25;margin-bottom:12px}
  textarea{width:100%;min-height:96px;resize:vertical;background:#070b14;border:1px solid var(--line);border-radius:11px;
    color:var(--perle);padding:12px 13px;font:1rem/1.55 'Lora',serif}
  textarea:focus{outline:none;border-color:var(--ice)}
  .saved{font-size:.78rem;color:var(--mut);margin-top:6px;height:14px;transition:.2s}
  .saved.on{color:#54d6a0}
  /* ── Barre d'actions ── */
  .bar{position:sticky;bottom:46px;z-index:20;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:26px}
  button{font:inherit;cursor:pointer;border:1px solid var(--line);border-radius:999px;padding:11px 20px;color:var(--perle);
    background:rgba(13,20,34,.9);transition:.15s}
  button:hover{transform:translateY(-1px);border-color:var(--ice)}
  .btn-or{background:linear-gradient(100deg,var(--or),#fff6df);color:#05060a;border:none;font-weight:600}
  .flag{text-align:center;letter-spacing:3px;color:#7f95b6;font-size:.8rem;margin-top:34px}
  .note{text-align:center;color:var(--mut);font-size:.86rem;margin-top:8px}
  /* ── Animations NAVLYS : révélations au scroll + micro-interactions (sobres) ── */
  .nav-js .reveal{opacity:0}
  .reveal.in{opacity:1;animation:navRise .75s cubic-bezier(.22,.61,.36,1) backwards}
  @keyframes navRise{from{opacity:0;transform:translateY(20px)}}
  .navBreathe{animation:navBreathe 5s ease-in-out infinite}
  @keyframes navBreathe{0%,100%{opacity:.86}50%{opacity:1}}
  .q{transition:border-color .3s ease,box-shadow .3s ease,transform .3s ease}
  .q:hover{border-color:rgba(125,211,252,.4);box-shadow:0 12px 30px rgba(125,211,252,.10)}
  .q:focus-within{border-color:var(--ice);box-shadow:0 0 0 3px rgba(125,211,252,.12)}
  .btn-or{transition:transform .2s ease,box-shadow .2s ease}
  .btn-or:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(233,211,160,.28)}
  @media (prefers-reduced-motion:reduce){
    .nav-js .reveal,.reveal.in{opacity:1!important;animation:none!important;transform:none!important}
    .navBreathe{animation:none!important}
    .q:hover,.btn-or:hover{transform:none!important}
  }
</style>
<script src="/vercel-speed-insights.js" defer></script>
</head>
<body>
<div class="stage"></div>
<!-- Vidéo cinéma de fond (HeyGen/HK) : déposer une URL .mp4 dans src pour l'activer -->
<video class="filmbg" autoplay muted loop playsinline poster=""></video>

<div class="wrap">
  <header class="hero">
    <div class="kicker">NAVLYS · NEXT GEN</div>
    <h1>Écris ta vie</h1>
    <p class="sub">Ta vie est un film. Voici l'écran. Réponds comme ça vient — Léa transformera tes mots en chapitres.</p>
    <div class="by navBreathe">🎬 accompagné par Léa <span style="color:var(--mut)">@navbio</span></div>
  </header>

  <div id="questions"></div>

  <div class="bar">
    <button class="btn-or" id="export">⬇️ Télécharger mon histoire</button>
    <button id="clear">Tout effacer</button>
  </div>
  <p class="note">✍️ Tout est sauvegardé <b>tout seul</b> sur cet appareil, au fur et à mesure. Tu peux fermer et revenir.</p>
  <div class="flag">🌊 ⚓ NAVLYS NEXT GEN 🪝</div>
</div>

<script>
// Les 10 questions guidées de Léa (NAVBIO) pour démarrer ton livre de vie.
const QUESTIONS = [
  "Quel est ton tout premier souvenir — une image, une odeur, un son d'enfance ?",
  "Où as-tu grandi, et qu'est-ce que ce lieu t'a transmis ?",
  "Qui, dans ta famille, a le plus façonné qui tu es aujourd'hui ?",
  "Quel moment t'a fait sentir, pour la première fois, que tu n'étais plus un enfant ?",
  "Ton arrivée — ou ta vie — dans ton pays d'accueil : qu'est-ce que ça a changé en toi ?",
  "Quelle épreuve t'a le plus appris, et que t'a-t-elle appris ?",
  "D'où est née l'idée de NAVLYS ? Quel était le déclic, le besoin, le rêve ?",
  "Quelles sont les 3 valeurs que tu ne trahirais jamais, quoi qu'il arrive ?",
  "Si tu pouvais transmettre UNE seule chose aux générations futures, ce serait quoi ?",
  "Dans 10 ans, de quoi veux-tu être fier en repensant à aujourd'hui ?"
];
const KEY='navlys_nextgen_vie';
const data = JSON.parse(localStorage.getItem(KEY)||'{}');

const box=document.getElementById('questions');
QUESTIONS.forEach((q,i)=>{
  const wrap=document.createElement('div'); wrap.className='q reveal';
  wrap.innerHTML=`<div class="num">Chapitre ${i+1}</div><div class="txt">${q}</div>
    <textarea id="a${i}" placeholder="Écris ici, librement…"></textarea>
    <div class="saved" id="s${i}"></div>`;
  box.appendChild(wrap);
  const ta=wrap.querySelector('textarea');
  ta.value=data['a'+i]||'';
  let t=null;
  ta.addEventListener('input',()=>{
    data['a'+i]=ta.value; localStorage.setItem(KEY,JSON.stringify(data));
    const s=document.getElementById('s'+i); s.textContent='✓ enregistré'; s.classList.add('on');
    clearTimeout(t); t=setTimeout(()=>{s.textContent='';s.classList.remove('on');},1200);
  });
});

document.getElementById('export').addEventListener('click',()=>{
  let out='MON HISTOIRE — NAVLYS Next Gen\n\n';
  QUESTIONS.forEach((q,i)=>{ out+=`Chapitre ${i+1} — ${q}\n${(data['a'+i]||'(à venir)')}\n\n`; });
  const blob=new Blob([out],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='mon-histoire-navlys.txt'; a.click();
});
document.getElementById('clear').addEventListener('click',()=>{
  if(confirm('Effacer toutes tes réponses sur cet appareil ?')){ localStorage.removeItem(KEY); location.reload(); }
});

/* révélations au scroll — vanilla, sûr (échoue en montrant tout) */
(function(){
  try{
    var els=document.querySelectorAll('.reveal');
    if(!els.length)return;
    var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var i;
    if(reduce||!('IntersectionObserver' in window)){
      for(i=0;i<els.length;i++)els[i].classList.add('in');
      return;
    }
    var obs=new IntersectionObserver(function(entries){
      var d=0;
      for(var k=0;k<entries.length;k++){
        var e=entries[k];
        if(e.isIntersecting){
          e.target.style.animationDelay=(d*70)+'ms';
          e.target.classList.add('in');
          obs.unobserve(e.target);
          d++;
        }
      }
    },{threshold:0.12,rootMargin:'0px 0px -6% 0px'});
    for(i=0;i<els.length;i++)obs.observe(els[i]);
  }catch(err){
    var all=document.querySelectorAll('.reveal');
    for(var j=0;j<all.length;j++)all[j].classList.add('in');
  }
})();
</script>
</body>
</html>
