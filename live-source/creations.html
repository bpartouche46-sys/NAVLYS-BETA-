<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>NAVLYS — Créations : les logos animés de l'univers</title>
<meta name="description" content="La galerie des créations NAVLYS : une animation de logo par application. Ice blue + or, tout respire.">
<link rel="canonical" href="https://navlys.com/creations">
<link rel="icon" type="image/svg+xml" href="/media/navlys_favicon.svg">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#05060a">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--noir:#05060a;--ice:#7DD3FC;--ice-clair:#a8e3ff;--or:#e9d3a0;--or-pale:#f3e4c4;--perle:#eef0f6;--mut:#9fb3c8;--line:rgba(125,211,252,.16)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(70% 55% at 50% 0%,#0c1a2c 0%,#05060a 62%);color:var(--perle);font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;-webkit-font-smoothing:antialiased;min-height:100vh;padding:0 0 80px}
.head{text-align:center;padding:68px 20px 12px}
.head .k{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.34em;color:var(--ice-clair);text-transform:uppercase}
.head h1{font-family:'Cinzel',serif;font-weight:600;font-size:clamp(26px,6vw,44px);letter-spacing:.08em;margin:10px 0 6px;
  background:linear-gradient(100deg,var(--or-pale),var(--or) 45%,#fff7e6 55%,var(--or) 72%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.head p{color:var(--mut);font-style:italic;max-width:640px;margin:0 auto;font-size:clamp(15px,3vw,19px)}
.grid{max-width:1040px;margin:26px auto 0;padding:0 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.card{display:flex;flex-direction:column;align-items:center;gap:8px;text-decoration:none;color:inherit;
  background:rgba(6,10,20,.55);border:1px solid var(--line);border-radius:18px;padding:22px 12px 16px;transition:transform .35s ease,border-color .35s ease,box-shadow .35s ease}
.card:hover{transform:translateY(-4px);border-color:rgba(125,211,252,.5);box-shadow:0 16px 40px rgba(125,211,252,.14)}
.card .slot{width:76px;height:76px;display:flex;align-items:center;justify-content:center}
.card .n{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.08em;color:var(--or-pale);text-transform:uppercase;text-align:center}
.card .t{color:var(--mut);font-size:14px;font-style:italic}
.foot{text-align:center;color:var(--mut);font-style:italic;margin-top:40px;padding:0 20px;font-size:14px}
@media(prefers-reduced-motion:reduce){.card{transition:none}}
</style>
<script src="/vercel-speed-insights.js" defer></script>
</head>
<body>
<div class="head">
  <div class="k">NAVLYS · Créations</div>
  <h1>L'univers, logo par logo</h1>
  <p>Une animation propre à chaque application — la même vague ice blue qui se dessine et respire, un motif différent à chaque porte. Tout est vivant.</p>
</div>

<div class="grid" id="grid" aria-label="Galerie des logos animés NAVLYS"></div>

<div class="foot">Ice blue + champagne or · fond sombre · chaque logo mène à son application. 🌊</div>

<script src="/navlys-logos.js" defer></script>
<script>
(function(){
  var tries=0;
  function build(){
    if(!window.NavlysLogo){ if(tries++<50){ setTimeout(build,120); } return; } // borné : ~6s max
    var grid=document.getElementById('grid');
    NavlysLogo.keys().forEach(function(key){
      var m=NavlysLogo.meta(key)||{};
      var href=(key==='index')?'/':'/'+key;
      var a=document.createElement('a');
      a.className='card'; a.href=href; a.setAttribute('aria-label',(m.nom||key)+' — '+(m.tag||''));
      var slot=document.createElement('div'); slot.className='slot';
      NavlysLogo.render(key, slot, 72);
      var n=document.createElement('div'); n.className='n'; n.textContent=m.nom||key;
      var t=document.createElement('div'); t.className='t'; t.textContent=m.tag||'';
      a.appendChild(slot); a.appendChild(n); a.appendChild(t);
      grid.appendChild(a);
    });
  }
  build();
})();
</script>
<script src="/navlys-alive.js" defer></script>
</body>
</html>
