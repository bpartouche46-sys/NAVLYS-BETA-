<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="robots" content="noindex"><title>NAVLYS Cockpit</title>
<style>:root{--bg:#070b12;--panel:#0f1726;--p2:#131e30;--ice:#7fd4ff;--gold:#d8bd84;--txt:#e8f2fb;--mut:#8fa6bd;--line:#1d2c42;--ok:#54d6a0;--bad:#ef7b7b}*{box-sizing:border-box;margin:0;padding:0}body{background:#070b12;color:#e8f2fb;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif}.wrap{max-width:1080px;margin:0 auto;padding:14px 14px 80px}.bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:14px;background:#0f1726;border:1px solid #1d2c42;border-radius:14px;margin-bottom:14px}.sp{flex:1}button{font:inherit;cursor:pointer;border:1px solid #1d2c42;background:#131e30;color:#e8f2fb;border-radius:10px;padding:8px 12px}.gold{background:#241f12;border-color:#5a4d2c;color:#efe0bd}.sm{padding:5px 9px;font-size:13px}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}.st{background:#0f1726;border:1px solid #1d2c42;border-radius:12px;padding:10px;text-align:center}.st .n{font-size:1.5rem;font-weight:700}.st .l{font-size:.66rem;color:#8fa6bd;text-transform:uppercase}.st.v .n{color:#d8bd84}h2{font-size:.8rem;letter-spacing:1px;text-transform:uppercase;color:#bfe9ff;margin:18px 4px 10px}.agents{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}.ag{background:#0f1726;border:1px solid #1d2c42;border-radius:10px;padding:9px}.ag .nm{font-weight:600}.ag .rl{font-size:11px;color:#8fa6bd;margin-top:3px}.cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.col{background:#0f1726;border:1px solid #1d2c42;border-radius:12px;padding:10px;min-height:70px}.col h3{font-size:12px;text-transform:uppercase;color:#8fa6bd;margin-bottom:8px}.col.v h3{color:#d8bd84}.m{background:#131e30;border:1px solid #1d2c42;border-radius:10px;padding:9px;margin-bottom:8px}.m .t{font-size:13px;font-weight:600}.m .d{font-size:11px;color:#7fd4ff;margin:4px 0}.acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.create textarea{width:100%;min-height:60px;background:#0a1322;border:1px solid #1d2c42;border-radius:10px;color:#e8f2fb;padding:10px;font:inherit}.jr{display:flex;gap:8px;padding:7px 4px;border-bottom:1px solid #121c2c;font-size:13px}.jr .ty{color:#8fa6bd;font-size:10px;text-transform:uppercase}#login{position:fixed;inset:0;background:rgba(4,8,14,.9);display:flex;align-items:center;justify-content:center;padding:18px}#login .c{background:#0f1726;border:1px solid #1d2c42;border-radius:16px;padding:24px;max-width:380px;width:100%;text-align:center}input[type=password]{width:100%;background:#0a1322;border:1px solid #1d2c42;border-radius:10px;color:#e8f2fb;padding:11px;margin:12px 0;font:inherit}#modal{position:fixed;inset:0;background:rgba(4,8,14,.85);display:none;align-items:center;justify-content:center;padding:18px}#modal .c{background:#0f1726;border:1px solid #1d2c42;border-radius:14px;padding:18px;max-width:620px;width:100%;max-height:84vh;overflow:auto}pre{white-space:pre-wrap;word-break:break-word;background:#0a1322;border:1px solid #1d2c42;border-radius:10px;padding:11px;font:12px/1.5 ui-monospace,monospace;color:#bfe9ff}.links{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:8px}.links a{display:flex;align-items:center;gap:7px;background:#0f1726;border:1px solid #1d2c42;border-radius:10px;padding:10px 11px;text-decoration:none;color:#e8f2fb;font-size:13px;transition:.2s}.links a:hover{border-color:#7fd4ff;background:#131e30}.links a .e{font-size:16px}.links a.g{border-color:#5a4d2c;background:#241f12;color:#efe0bd}</style></head><body>
<div id="login"><div class="c"><div style="font-size:30px;font-family:Cinzel,serif;letter-spacing:.2em;color:#d8bd84">NAVLYS</div><h3 style="margin-top:6px;color:#bfe9ff">Cockpit</h3><input id="pw" type="password" placeholder="Mot de passe"><button style="width:100%" onclick="login()">Entrer</button><p id="le" style="color:#ef7b7b;font-size:13px;min-height:18px;margin-top:8px"></p></div></div>
<div class="wrap" id="app" style="display:none"><div class="bar"><b>NAVLYS · COCKPIT</b><span id="clock" style="font-size:12px;color:#7fd4ff;font-variant-numeric:tabular-nums">⏱ --:--:--</span><span id="cn" style="font-size:11px;color:#8fa6bd"></span><span class="sp"></span><button class="gold sm" onclick="brief()">Rapport</button><button class="sm" onclick="load()">Rafraîchir</button><button class="sm" onclick="logout()">Quitter</button></div><div id="penta" style="text-align:center;margin-bottom:6px"></div><div class="stats" id="stats"></div><h2>Accès direct · tout NAVLYS</h2><div class="links"><a href="/" target="_blank"><span class="e">≋</span>Accueil</a><a href="/cinema" target="_blank"><span class="e">🎬</span>Cinéma</a><a href="/finance" target="_blank"><span class="e">📈</span>Finance</a><a class="g" href="/next-gen" target="_blank"><span class="e">📖</span>Next Gen</a><a class="g" href="/next-gen-atelier" target="_blank"><span class="e">🎞️</span>Atelier</a><a href="/navlex" target="_blank"><span class="e">⚖️</span>NAVLEX</a><a href="/assistance" target="_blank"><span class="e">🎙️</span>Assistance</a><a href="/equipage" target="_blank"><span class="e">⛵</span>Équipage</a><a href="/bibles" target="_blank"><span class="e">📚</span>Bibles</a><a class="g" href="/croissance" target="_blank"><span class="e">🌱</span>Croissance</a><a class="g" href="/bible-marketing" target="_blank"><span class="e">📣</span>Bible Marketing</a><a href="/io" target="_blank"><span class="e">🚀</span>NAVLYS.IO</a><a href="/radio" target="_blank"><span class="e">📻</span>Radio</a><a href="/tech" target="_blank"><span class="e">✨</span>Journal</a><a href="/influenceurs" target="_blank"><span class="e">🌟</span>Influenceurs</a><a href="/partenaires" target="_blank"><span class="e">🤝</span>Partenaires</a></div><h2>Dialogue avec NAVLYS</h2><div id="chat" style="background:#0f1726;border:1px solid #1d2c42;border-radius:12px;padding:10px;max-height:280px;overflow:auto;min-height:60px"></div><div style="display:flex;gap:8px;margin-top:8px"><textarea id="dq" placeholder="Parle à NAVLYS (VIP n°1)…" style="flex:1;min-height:46px;background:#0a1322;border:1px solid #1d2c42;border-radius:10px;color:#e8f2fb;padding:10px;font:inherit"></textarea><button class="gold" onclick="dsend()">Envoyer</button></div><h2>Les agents</h2><div class="agents" id="agents"></div><h2>Missions</h2><div class="cols" id="missions"></div><h2>Donner un ordre</h2><div class="create"><textarea id="ord" placeholder="Ex : @navfi prépare la leçon du jour"></textarea><div style="margin-top:8px"><button onclick="send()">Confier</button> <span id="ch" style="color:#8fa6bd;font-size:12px"></span></div></div><h2>Journal</h2><div id="journal" style="background:#0f1726;border:1px solid #1d2c42;border-radius:12px;padding:6px 8px;max-height:300px;overflow:auto"></div></div>
<div id="modal"><div class="c" id="mc"></div></div>
<script>
var ENDPOINT='https://hhrlgyvtqluxpywjiwkd.supabase.co/functions/v1/cockpit';
var TK=localStorage.getItem('np_tk')||'';var S={agents:[],missions:[],journal:[],stats:{}};var T=null;
function E(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return c=='&'?'&amp;':c=='<'?'&lt;':'&gt;'});}
function api(action,extra){extra=extra||{};var b={action:action,token:TK};for(var k in extra)b[k]=extra[k];return fetch(ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(function(r){if(r.status===401){logout();throw 0;}return r.json();});}
function login(){TK=document.getElementById('pw').value.trim();document.getElementById('le').textContent='...';api('state').then(function(d){if(d.error){document.getElementById('le').textContent=d.error;return;}localStorage.setItem('np_tk',TK);document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';S=d;render();start();}).catch(function(){document.getElementById('le').textContent='Mot de passe incorrect.';});}
function logout(){TK='';localStorage.removeItem('np_tk');if(T)clearInterval(T);document.getElementById('app').style.display='none';document.getElementById('login').style.display='flex';}
function load(){api('state').then(function(d){if(!d.error){S=d;render();}});}
function start(){if(T)clearInterval(T);T=setInterval(load,5000);}
var ORD=['a_valider','a_faire','en_cours','fait','erreur'];var LB={a_valider:'A valider',a_faire:'A faire',en_cours:'En cours',fait:'Fait',erreur:'Erreur'};
function two(n){return(n<10?'0':'')+n;}
function tick(){var d=new Date();var el=document.getElementById('clock');if(el)el.innerHTML='<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#54d6a0;box-shadow:0 0 8px #54d6a0;vertical-align:middle;margin-right:5px"></span>Temps réel certifié · '+two(d.getHours())+':'+two(d.getMinutes())+':'+two(d.getSeconds());}
setInterval(tick,1000);tick();
function renderPenta(){var cols={a_valider:'#d8bd84',a_faire:'#7fd4ff',en_cours:'#7fd4ff',fait:'#54d6a0',erreur:'#ef7b7b'};var cx=150,cy=145,r=100,pts=[],i,a;for(i=0;i<5;i++){a=(-90+i*72)*Math.PI/180;pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}var poly=pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');var s='<svg viewBox="0 0 300 280" width="100%" style="max-width:360px" role="img" aria-label="Vision pentagone NAVLYS">';s+='<polygon points="'+poly+'" fill="rgba(127,212,255,.05)" stroke="rgba(127,212,255,.35)" stroke-width="1.5"/>';for(i=0;i<5;i++){s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+pts[i][0].toFixed(1)+'" y2="'+pts[i][1].toFixed(1)+'" stroke="rgba(127,212,255,.12)"/>';}s+='<circle cx="'+cx+'" cy="'+cy+'" r="24" fill="#0f1726" stroke="#d8bd84"/><text x="'+cx+'" y="'+(cy+4)+'" text-anchor="middle" fill="#d8bd84" font-size="10" font-family="Cinzel,serif" letter-spacing="1">NAVLYS</text>';for(i=0;i<5;i++){var k=ORD[i],v=(S.stats[k]||0),c=cols[k],x=pts[i][0],y=pts[i][1];s+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="20" fill="#131e30" stroke="'+c+'" stroke-width="1.5"><animate attributeName="r" values="19;21.5;19" dur="2.6s" repeatCount="indefinite"/></circle>';s+='<text x="'+x.toFixed(1)+'" y="'+(y+5).toFixed(1)+'" text-anchor="middle" fill="'+c+'" font-size="15" font-weight="700">'+v+'</text>';s+='<text x="'+x.toFixed(1)+'" y="'+(y+(y<cy-10?-27:33)).toFixed(1)+'" text-anchor="middle" fill="#8fa6bd" font-size="8.5">'+LB[k].toUpperCase()+'</text>';}s+='</svg>';var el=document.getElementById('penta');if(el)el.innerHTML=s;}
function render(){var i,h='';for(i=0;i<ORD.length;i++){var k=ORD[i];h+="<div class='st"+(k=='a_valider'?' v':'')+"'><div class='n'>"+(S.stats[k]||0)+"</div><div class='l'>"+LB[k]+"</div></div>";}document.getElementById('stats').innerHTML=h;renderPenta();var cn=document.getElementById('cn');if(cn)cn.textContent='synchro '+two(new Date().getHours())+':'+two(new Date().getMinutes())+':'+two(new Date().getSeconds());var a='';for(i=0;i<S.agents.length;i++){var ag=S.agents[i];a+="<div class='ag'><div class='nm'>"+E(ag.prenom||ag.id)+"</div><div class='rl'>"+E(ag.id)+(ag.autonomie=='auto'?' · auto':' · prepare')+"</div></div>";}document.getElementById('agents').innerHTML=a;var c='';for(i=0;i<ORD.length;i++){var st=ORD[i];var list=S.missions.filter(function(m){return m.statut==st;});var cards='';for(var n=0;n<list.length;n++){cards+=mc(list[n]);}c+="<div class='col"+(st=='a_valider'?' v':'')+"'><h3>"+LB[st]+" ("+list.length+")</h3>"+(cards||"<div style='color:#8fa6bd;font-size:12px'>-</div>")+"</div>";}document.getElementById('missions').innerHTML=c;var jh='';for(i=0;i<S.journal.length;i++){var e=S.journal[i];jh+="<div class='jr'><span class='ty'>"+E(e.type||'.')+"</span><span>"+E(e.message||'')+"</span></div>";}document.getElementById('journal').innerHTML=jh||"<div style='color:#8fa6bd;padding:8px'>-</div>";}
function mc(m){var acts="<button class='sm' onclick='vo("+m.id+")'>Voir</button>";if(m.statut=='a_valider')acts+=" <button class='sm gold' onclick='va("+m.id+")'>Valider</button> <button class='sm' onclick='re("+m.id+")'>Refuser</button>";return "<div class='m'><div class='t'>"+E(m.titre||'')+"</div><div class='d'>"+E(m.departement||'')+" #"+m.id+"</div><div class='acts'>"+acts+"</div></div>";}
function find(id){for(var i=0;i<S.missions.length;i++)if(String(S.missions[i].id)==String(id))return S.missions[i];return null;}
function vo(id){var m=find(id);if(!m)return;om("<h3>"+E(m.titre)+"</h3><pre>"+E(m.resultat||'(pas encore de livrable)')+"</pre><div style='margin-top:10px'>"+(m.statut=='a_valider'?"<button class='gold' onclick='va("+m.id+")'>Valider</button> <button onclick='re("+m.id+")'>Refuser</button> ":'')+"<button onclick='cm()'>Fermer</button></div>");}
function va(id){api('valider',{id:id}).then(function(){cm();load();});}
function re(id){var motif=prompt('Motif du refus ?')||'';api('refuser',{id:id,motif:motif}).then(function(){cm();load();});}
function send(){var t=document.getElementById('ord').value.trim();if(!t){document.getElementById('ch').textContent='Ecris une consigne.';return;}document.getElementById('ch').textContent='Envoi...';api('create',{texte:t}).then(function(d){document.getElementById('ord').value='';document.getElementById('ch').textContent='Confie a '+(d.departement||'agent');load();});}
function brief(){api('briefing').then(function(d){om("<h3>Rapport</h3><pre style='font-family:inherit;font-size:14px'>"+E(d.text||'')+"</pre><div style='margin-top:10px'><button onclick='cm()'>Fermer</button></div>");if('speechSynthesis' in window){var u=new SpeechSynthesisUtterance(d.text||'');u.lang='fr-FR';speechSynthesis.cancel();speechSynthesis.speak(u);}});}
function om(html){document.getElementById('mc').innerHTML=html;document.getElementById('modal').style.display='flex';}
function cm(){document.getElementById('modal').style.display='none';}
document.getElementById('modal').addEventListener('click',function(ev){if(ev.target.id=='modal')cm();});
document.getElementById('pw').addEventListener('keydown',function(ev){if(ev.key=='Enter')login();});
var ASSIST='https://hhrlgyvtqluxpywjiwkd.supabase.co/functions/v1/assistant',DSESS='cockpit-bruno';
function dadd(role,txt){var c=document.getElementById('chat');var d=document.createElement('div');d.style.cssText='margin:6px 0;padding:8px 11px;border-radius:10px;font-size:14px;white-space:pre-wrap;'+(role=='u'?'background:#131e30;border:1px solid #1d2c42':'background:#0a1322;border:1px solid #24406a');d.textContent=txt;c.appendChild(d);c.scrollTop=c.scrollHeight;return d;}
function dsend(){var q=document.getElementById('dq');var t=(q.value||'').trim();if(!t)return;dadd('u',t);q.value='';var p=dadd('n','…');fetch(ASSIST,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session:DSESS,text:t})}).then(function(r){return r.json();}).then(function(d){var rep=(d&&d.reply)?d.reply:'…';p.textContent=rep;if('speechSynthesis' in window){var u=new SpeechSynthesisUtterance(rep.replace(/[*_#>`]/g,''));u.lang='fr-FR';speechSynthesis.cancel();speechSynthesis.speak(u);}}).catch(function(){p.textContent='Connexion difficile, réessaie.';});}
document.addEventListener('keydown',function(e){if(e.target&&e.target.id=='dq'&&e.key=='Enter'&&!e.shiftKey){e.preventDefault();dsend();}});
if(TK){api('state').then(function(d){if(!d.error){document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';S=d;render();start();dadd('n','Bonjour Bruno 👋 Je suis là. Dis-moi tout.');}});}
</script></body></html>
