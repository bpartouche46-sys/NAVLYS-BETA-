<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>NAVLYS — Cockpit central</title>
<style>
  :root{
    --bg:#070b12; --bg2:#0c1320; --panel:#0f1726; --panel2:#131e30;
    --ice:#7fd4ff; --ice-soft:#bfe9ff; --gold:#d8bd84; --gold-soft:#efe0bd;
    --txt:#e8f2fb; --muted:#8fa6bd; --line:#1d2c42;
    --ok:#54d6a0; --warn:#e8c15a; --bad:#ef7b7b; --wait:#7fd4ff;
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:radial-gradient(1200px 700px at 70% -10%,#10203a 0%,var(--bg) 55%);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--ice)}
  .wrap{max-width:1120px;margin:0 auto;padding:14px 14px 80px}
  /* ── Header ── */
  header.bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:14px 16px;margin-bottom:14px;
    background:linear-gradient(180deg,var(--panel) 0%,var(--bg2) 100%);border:1px solid var(--line);border-radius:var(--radius)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.5px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--ice);box-shadow:0 0 12px var(--ice)}
  .brand small{display:block;font-weight:400;color:var(--muted);letter-spacing:.3px}
  .spacer{flex:1}
  button,.btn{font:inherit;cursor:pointer;border-radius:12px;border:1px solid var(--line);
    background:var(--panel2);color:var(--txt);padding:9px 14px;transition:.15s}
  button:hover,.btn:hover{border-color:var(--ice);transform:translateY(-1px)}
  .btn-gold{background:linear-gradient(180deg,#3a3320,#241f12);border-color:#5a4d2c;color:var(--gold-soft)}
  .btn-gold:hover{border-color:var(--gold)}
  .btn-ice{background:linear-gradient(180deg,#12354b,#0c2335);border-color:#1d5675;color:var(--ice-soft)}
  .btn-sm{padding:6px 10px;font-size:13px;border-radius:10px}
  .conn{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .conn .led{width:9px;height:9px;border-radius:50%;background:var(--muted)}
  .conn.online .led{background:var(--ok);box-shadow:0 0 9px var(--ok)}
  .conn.offline .led{background:var(--bad);box-shadow:0 0 9px var(--bad)}
  /* ── Stats strip ── */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 10px;text-align:center}
  .stat .n{font-size:26px;font-weight:700;line-height:1}
  .stat .l{font-size:11px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.6px}
  .stat.valider{border-color:#4a3c1c;background:linear-gradient(180deg,#1a160c,var(--panel))}
  .stat.valider .n{color:var(--gold)}
  .stat.erreur .n{color:var(--bad)}
  /* ── Sections ── */
  h2.sec{font-size:15px;letter-spacing:1px;text-transform:uppercase;color:var(--ice-soft);
    margin:22px 4px 12px;display:flex;align-items:center;gap:9px}
  h2.sec::before{content:"";width:7px;height:18px;border-radius:3px;background:linear-gradient(var(--ice),var(--gold))}
  /* ── Agents grid ── */
  .agents{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:12px}
  .agent{background:linear-gradient(180deg,var(--panel) 0%,var(--bg2) 100%);border:1px solid var(--line);
    border-radius:14px;padding:13px 13px 12px;position:relative;overflow:hidden}
  .agent::after{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:linear-gradient(90deg,var(--ice),transparent)}
  .agent .top{display:flex;align-items:center;gap:10px}
  .agent .emo{font-size:22px;width:40px;height:40px;display:grid;place-items:center;border-radius:11px;
    background:#0b1828;border:1px solid var(--line)}
  .agent .nm{font-weight:700}
  .agent .hd{font-size:12px;color:var(--ice);font-family:ui-monospace,monospace}
  .agent .role{font-size:12.5px;color:var(--muted);margin:9px 0 10px;min-height:34px;line-height:1.35}
  .agent .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .badge{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--line);color:var(--muted)}
  .badge.auto{color:var(--ok);border-color:#22513c}
  .badge.prepare{color:var(--ice);border-color:#1d4a64}
  .badge.cnt{color:var(--gold-soft);border-color:#4a3c1c}
  .live{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .live .led{width:8px;height:8px;border-radius:50%;background:#33485f}
  .live.on .led{background:var(--ok);box-shadow:0 0 8px var(--ok)}
  /* ── Missions ── */
  .cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;min-height:80px}
  .col h3{margin:2px 4px 12px;font-size:13px;letter-spacing:.6px;text-transform:uppercase;display:flex;gap:8px;align-items:center}
  .col h3 .pill{margin-left:auto;font-size:12px;background:#0b1828;border:1px solid var(--line);border-radius:20px;padding:1px 9px;color:var(--muted)}
  .col.valider{border-color:#4a3c1c}
  .col.valider h3{color:var(--gold)}
  .mission{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:11px;margin-bottom:10px}
  .mission .mt{font-size:14px;font-weight:600;line-height:1.3}
  .mission .md{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
  .deptg{font-size:11px;font-family:ui-monospace,monospace;color:var(--ice);background:#0b1828;border:1px solid var(--line);border-radius:6px;padding:2px 7px}
  .mid{font-size:11px;color:var(--muted)}
  .mission .acts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:14px 0}
  /* ── Journal ── */
  .journal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:6px 4px;max-height:340px;overflow:auto}
  .jrow{display:flex;gap:10px;padding:9px 12px;border-bottom:1px solid #121c2c;font-size:13px}
  .jrow:last-child{border-bottom:none}
  .jtype{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;border-radius:6px;padding:2px 7px;height:fit-content;white-space:nowrap}
  .jt-ordre{color:var(--ice);border:1px solid #1d4a64}
  .jt-agent{color:var(--gold-soft);border:1px solid #4a3c1c}
  .jt-validation{color:var(--ok);border:1px solid #22513c}
  .jt-refus,.jt-erreur{color:var(--bad);border:1px solid #5a2c2c}
  .jt-default{color:var(--muted);border:1px solid var(--line)}
  .jmsg{flex:1;color:var(--txt)}
  .jtime{color:var(--muted);font-size:11px;white-space:nowrap}
  /* ── Create box ── */
  .create{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:14px}
  .create textarea{width:100%;min-height:72px;resize:vertical;background:#0a1322;border:1px solid var(--line);border-radius:11px;
    color:var(--txt);padding:11px;font:inherit}
  .create .row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;align-items:center}
  select{background:#0a1322;border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:9px 11px;font:inherit}
  .hint{color:var(--muted);font-size:12.5px;margin-top:8px}
  /* ── Modals / overlay ── */
  .overlay{position:fixed;inset:0;background:rgba(4,8,14,.82);backdrop-filter:blur(4px);display:none;
    align-items:center;justify-content:center;padding:18px;z-index:50}
  .overlay.show{display:flex}
  .card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:18px;
    padding:22px;max-width:560px;width:100%;max-height:86vh;overflow:auto}
  .card h3{margin:0 0 6px;color:var(--ice-soft)}
  .card pre{white-space:pre-wrap;word-break:break-word;background:#0a1322;border:1px solid var(--line);border-radius:11px;
    padding:12px;font:13px/1.5 ui-monospace,monospace;color:var(--ice-soft)}
  .card input{width:100%;background:#0a1322;border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:12px;font:inherit;margin:10px 0}
  .login-logo{font-size:34px;text-align:center;margin-bottom:4px}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--ice);
    color:var(--ice-soft);padding:11px 18px;border-radius:12px;z-index:60;opacity:0;transition:.25s;pointer-events:none;max-width:90vw}
  .toast.show{opacity:1}
  .speaking{animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(216,189,132,.5)}50%{box-shadow:0 0 0 8px rgba(216,189,132,0)}}
  @media(max-width:560px){.stats{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <header class="bar">
    <div class="brand">
      <span class="dot"></span>
      <div>NAVLYS · COCKPIT CENTRAL
        <small>Le corps central et ses 14 agents — en direct</small>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="conn" id="conn"><span class="led"></span><span id="connTxt">connexion…</span></div>
    <button class="btn-gold speaking-host" id="briefBtn" title="Rapport oral du Rapporteur">🔊 Rapport vocal</button>
    <button class="btn-ice" id="refreshBtn" title="Rafraîchir">↻</button>
    <button class="btn-sm" id="logoutBtn" title="Se déconnecter">⏻</button>
  </header>

  <div class="stats" id="stats"></div>

  <h2 class="sec">Les 14 agents — qui fait quoi</h2>
  <div class="agents" id="agents"></div>

  <h2 class="sec">Missions — le travail en cours</h2>
  <div class="cols" id="missions"></div>

  <h2 class="sec">Donner un ordre au corps central</h2>
  <div class="create">
    <textarea id="ordre" placeholder="Ex : @navfi prépare la mini-leçon du jour sur les ETF — ou écris simplement ce que tu veux, MasterNav choisira l'agent."></textarea>
    <div class="row">
      <select id="deptSel"><option value="">🧭 Laisser MasterNav choisir</option></select>
      <button class="btn-ice" id="sendOrdre">Confier la mission →</button>
      <span class="hint" id="createHint"></span>
    </div>
  </div>

  <h2 class="sec">Journal vivant — ce qui se passe</h2>
  <div class="journal" id="journal"></div>
</div>

<!-- Login overlay -->
<div class="overlay" id="loginOverlay">
  <div class="card">
    <div class="login-logo">🧭</div>
    <h3 style="text-align:center">Cockpit NAVLYS</h3>
    <p style="text-align:center;color:var(--muted);margin-top:4px">Entre ton mot de passe cockpit pour piloter le corps central.</p>
    <input type="password" id="tokenInput" placeholder="Mot de passe cockpit" autocomplete="current-password" />
    <button class="btn-ice" style="width:100%" id="loginBtn">Entrer dans le cockpit</button>
    <p class="hint" id="loginErr" style="color:var(--bad);text-align:center;min-height:18px"></p>
  </div>
</div>

<!-- Mission detail / refuse modal -->
<div class="overlay" id="modal"><div class="card" id="modalCard"></div></div>
<div class="toast" id="toast"></div>

<script>
const API = '/api/cockpit';
let TOKEN = localStorage.getItem('navlys_cockpit_token') || '';
let STATE = { agents: [], missions: [], journal: [], stats: {} };
let timer = null;

// Référentiel statique des 14 agents (visuel + descriptions), enrichi par le live.
const AGENT_INFO = {
  NAVTECH:{emo:'🛠️',prenom:'Tom',handle:'@navtech',role:'Site, infra Vercel, déploiement, sécurité technique'},
  NAVCOM:{emo:'📣',prenom:'Clara',handle:'@navcom',role:'Contenus, posts, Daily News FR + EN'},
  NAVFI:{emo:'📈',prenom:'Victor',handle:'@navfi',role:'Éducation & veille finance (simple citoyen)'},
  NAVBIO:{emo:'📖',prenom:'Léa',handle:'@navbio',role:'Livre / film de vie « Next Gen »'},
  NAVME:{emo:'🧠',prenom:'Mina',handle:'@navme',role:'Mémoire vivante du CORE (auto)'},
  NAVGEN:{emo:'🎨',prenom:'Gabriel',handle:'@navgen',role:'Visuels / logos via fal.ai (payant = validé)'},
  NAVLEX:{emo:'⚖️',prenom:'Alex',handle:'@navlex',role:'Juridique, RGPD, CGV, conformité'},
  NAVPART:{emo:'🤝',prenom:'Paul',handle:'@navpart',role:'Affiliations (Binance, Alpaca, eToro…)'},
  NAVPTE:{emo:'🛡️',prenom:'Sentinelle',handle:'@navpte',role:'Sécurité, secrets exposés (auto)'},
  NAVLEAD:{emo:'🌟',prenom:'Lena',handle:'@navlead',role:'Relations influenceurs & ambassadeurs'},
  NAVMKT:{emo:'🧭',prenom:'Marc',handle:'@navmkt',role:'Audit & cohérence du CORE (auto)'},
  NAVLAB:{emo:'🔬',prenom:'Newton',handle:'@navlab',role:'R&D, pipeline innovation (auto)'},
  NAVBIEN:{emo:'🌿',prenom:'Bianca',handle:'@navbien',role:'Bien-être & accessibilité'},
  NAVDEM:{emo:'💬',prenom:'David',handle:'@navdem',role:'Produit : retours membres → évolutions'},
};
const STATUTS = [
  {key:'a_valider',label:'À valider',cls:'valider'},
  {key:'a_faire',label:'À faire',cls:''},
  {key:'en_cours',label:'En cours',cls:''},
  {key:'fait',label:'Fait',cls:''},
  {key:'erreur',label:'Erreur',cls:''},
];

const $ = (id) => document.getElementById(id);
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function timeAgo(iso){ if(!iso) return ''; const d=new Date(iso); if(isNaN(d)) return ''; const s=(Date.now()-d.getTime())/1000;
  if(s<60) return 'à l\'instant'; if(s<3600) return Math.floor(s/60)+' min'; if(s<86400) return Math.floor(s/3600)+' h'; return Math.floor(s/86400)+' j'; }

async function api(action, extra={}){
  const r = await fetch(API,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
    body:JSON.stringify({action,...extra})});
  if(r.status===401){ logout('Mot de passe refusé.'); throw new Error('401'); }
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.error||('HTTP '+r.status));
  return data;
}

function setConn(ok){ const c=$('conn'); c.className='conn '+(ok?'online':'offline');
  $('connTxt').textContent = ok ? 'en direct' : 'hors ligne'; }

function render(){
  // Stats
  const order=['a_valider','a_faire','en_cours','fait','erreur'];
  $('stats').innerHTML = order.map(k=>{
    const lab={a_valider:'À valider',a_faire:'À faire',en_cours:'En cours',fait:'Fait',erreur:'Erreur'}[k];
    const cls = k==='a_valider'?'stat valider':(k==='erreur'?'stat erreur':'stat');
    return `<div class="${cls}"><div class="n">${STATE.stats[k]||0}</div><div class="l">${lab}</div></div>`;
  }).join('');

  // Compte de missions actives par département
  const cnt={}; STATE.missions.forEach(m=>{ if(['a_faire','en_cours','a_valider'].includes(m.statut)) cnt[m.departement]=(cnt[m.departement]||0)+1; });
  const liveDepts=new Set(STATE.agents.map(a=>a.id));

  // Agents : on part du référentiel des 14, enrichi par le live.
  const ids = Object.keys(AGENT_INFO);
  $('agents').innerHTML = ids.map(id=>{
    const info=AGENT_INFO[id];
    const live=STATE.agents.find(a=>a.id===id)||{};
    const prenom=live.prenom||info.prenom, handle=live.handle||info.handle;
    const role=live.role||info.role;
    const auto=(live.autonomie||'')==='auto';
    const actif=live.actif!==false && liveDepts.has(id);
    const n=cnt[id]||0;
    return `<div class="agent">
      <div class="top"><div class="emo">${info.emo}</div>
        <div><div class="nm">${esc(prenom)}</div><div class="hd">${esc(handle)}</div></div>
        <div class="live ${actif?'on':''}"><span class="led"></span>${actif?'actif':'—'}</div>
      </div>
      <div class="role">${esc(role)}</div>
      <div class="meta">
        <span class="badge ${auto?'auto':'prepare'}">${auto?'⚡ auto':'✋ prépare'}</span>
        ${n?`<span class="badge cnt">${n} mission${n>1?'s':''}</span>`:''}
        <code class="hd" style="margin-left:auto;font-size:11px">${esc(id)}</code>
      </div>
    </div>`;
  }).join('');

  // Missions par colonne de statut
  $('missions').innerHTML = STATUTS.map(s=>{
    const list=STATE.missions.filter(m=>m.statut===s.key);
    const cards = list.length ? list.map(m=>missionCard(m,s.key)).join('') : `<div class="empty">— rien ici —</div>`;
    return `<div class="col ${s.cls}"><h3>${s.label}<span class="pill">${list.length}</span></h3>${cards}</div>`;
  }).join('');

  // Journal
  $('journal').innerHTML = STATE.journal.length ? STATE.journal.map(e=>{
    const t=(e.type||'default').toLowerCase();
    const cls='jt-'+(['ordre','agent','validation','refus','erreur'].includes(t)?t:'default');
    return `<div class="jrow"><span class="jtype ${cls}">${esc(e.type||'·')}</span>
      <span class="jmsg">${esc(e.message||'')}</span><span class="jtime">${timeAgo(e.ts||e.created_at)}</span></div>`;
  }).join('') : `<div class="empty">Journal vide pour l'instant.</div>`;
}

function missionCard(m,statut){
  const acts=[`<button class="btn-sm" onclick="voir('${m.id}')">👁 Voir</button>`];
  if(statut==='a_valider'){
    acts.push(`<button class="btn-sm btn-gold" onclick="valider('${m.id}')">✓ Valider</button>`);
    acts.push(`<button class="btn-sm" onclick="refuser('${m.id}')">↩ Refuser</button>`);
  }
  const emo=(AGENT_INFO[m.departement]||{}).emo||'•';
  return `<div class="mission">
    <div class="mt">${esc(m.titre||'(sans titre)')}</div>
    <div class="md"><span class="deptg">${emo} ${esc(m.departement||'?')}</span><span class="mid">#${esc(m.id)}</span></div>
    <div class="acts">${acts.join('')}</div>
  </div>`;
}

// ── Actions ──
async function refresh(){
  try{ const d=await api('state'); STATE=d; setConn(true); render(); }
  catch(e){ if(String(e.message)!=='401') setConn(false); }
}
function voir(id){
  const m=STATE.missions.find(x=>String(x.id)===String(id)); if(!m) return;
  openModal(`<h3>${esc(m.titre||'Mission')} <span class="hd">#${esc(m.id)}</span></h3>
    <div class="md" style="margin:6px 0 12px"><span class="deptg">${esc(m.departement)}</span>
      <span class="badge">${esc(m.statut)}</span></div>
    <div style="color:var(--muted);font-size:12px;margin-bottom:4px">Consigne</div>
    <pre>${esc(m.consigne||'—')}</pre>
    <div style="color:var(--muted);font-size:12px;margin:12px 0 4px">Livrable de l'agent</div>
    <pre>${esc(m.resultat||'(pas encore de livrable)')}</pre>
    <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
      ${m.statut==='a_valider'?`<button class="btn-gold" onclick="valider('${m.id}')">✓ Valider</button>
        <button class="btn" onclick="refuser('${m.id}')">↩ Refuser</button>`:''}
      <button class="btn" onclick="closeModal()">Fermer</button>
    </div>`);
}
async function valider(id){
  try{ await api('valider',{id}); closeModal(); toast('✓ Mission validée'); refresh(); }
  catch(e){ toast('Erreur : '+e.message); }
}
function refuser(id){
  openModal(`<h3>Refuser la mission #${esc(id)}</h3>
    <p style="color:var(--muted)">Donne un motif : l'agent la reprendra avec ta remarque.</p>
    <input id="motif" placeholder="Ex : reformule plus court, ajoute le disclaimer…" />
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn-ice" onclick="doRefuser('${id}')">Renvoyer à l'agent</button>
      <button class="btn" onclick="closeModal()">Annuler</button>
    </div>`);
  setTimeout(()=>$('motif')&&$('motif').focus(),50);
}
async function doRefuser(id){
  const motif=($('motif')&&$('motif').value)||'';
  try{ await api('refuser',{id,motif}); closeModal(); toast('↩ Renvoyée à l\'agent'); refresh(); }
  catch(e){ toast('Erreur : '+e.message); }
}
async function sendOrdre(){
  const texte=$('ordre').value.trim();
  if(!texte){ $('createHint').textContent='Écris d\'abord ta consigne.'; return; }
  $('createHint').textContent='Envoi…';
  try{
    const d=await api('create',{texte,departement:$('deptSel').value||undefined});
    $('ordre').value=''; $('deptSel').value='';
    $('createHint').textContent='';
    toast('📥 Mission confiée à '+(d.departement||'l\'agent'));
    refresh();
  }catch(e){ $('createHint').textContent='Erreur : '+e.message; }
}

// ── Rapporteur vocal ──
let speaking=false;
async function briefing(){
  const btn=$('briefBtn');
  if(speaking){ try{window.speechSynthesis.cancel();}catch(e){} if(briefAudio){try{briefAudio.pause();}catch(e){}} speaking=false; btn.classList.remove('speaking'); btn.textContent='🔊 Rapport vocal'; return; }
  btn.textContent='… le Rapporteur prépare';
  try{
    const d=await api('briefing');
    const text=d.text||'Rien à signaler.';
    openModal(`<h3>🔊 Rapport du Rapporteur</h3><pre style="font-family:inherit;font-size:14.5px;line-height:1.55">${esc(text)}</pre>
      <div style="display:flex;gap:8px;margin-top:12px"><button class="btn" onclick="closeModal()">Fermer</button></div>`);
    speak(text);
  }catch(e){ toast('Rapporteur indisponible : '+e.message); }
  finally{ btn.textContent='🔊 Rapport vocal'; }
}
let briefAudio=null;
async function speak(text){
  const btn=$('briefBtn');
  // 1) On tente la VRAIE voix NAVLYS (ElevenLabs via /api/voice).
  try{
    const r=await fetch('/api/voice',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text.slice(0,1200)})});
    if(r.ok && (r.headers.get('content-type')||'').includes('audio')){
      const url=URL.createObjectURL(await r.blob());
      if(briefAudio){ briefAudio.pause(); }
      briefAudio=new Audio(url);
      speaking=true; btn.classList.add('speaking');
      briefAudio.onended=()=>{speaking=false;btn.classList.remove('speaking');URL.revokeObjectURL(url);};
      await briefAudio.play();
      return;
    }
  }catch(e){ /* voix NAVLYS indisponible -> on bascule sur la voix du navigateur */ }
  // 2) Repli : voix du navigateur (toujours dispo, hors-ligne).
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='fr-FR'; u.rate=1; u.pitch=1;
  const fr=window.speechSynthesis.getVoices().find(v=>/fr/i.test(v.lang));
  if(fr) u.voice=fr;
  u.onstart=()=>{speaking=true;btn.classList.add('speaking');};
  u.onend=()=>{speaking=false;btn.classList.remove('speaking');};
  window.speechSynthesis.speak(u);
}

// ── Modal helpers ──
function openModal(html){ $('modalCard').innerHTML=html; $('modal').classList.add('show'); }
function closeModal(){ $('modal').classList.remove('show'); }
$('modal').addEventListener('click',e=>{ if(e.target===$('modal')) closeModal(); });

// ── Login / session ──
function showLogin(){ $('loginOverlay').classList.add('show'); setTimeout(()=>$('tokenInput').focus(),50); }
function hideLogin(){ $('loginOverlay').classList.remove('show'); }
function logout(msg){
  TOKEN=''; localStorage.removeItem('navlys_cockpit_token');
  if(timer){ clearInterval(timer); timer=null; }
  showLogin(); if(msg) $('loginErr').textContent=msg;
}
async function login(){
  const t=$('tokenInput').value.trim();
  if(!t){ $('loginErr').textContent='Entre ton mot de passe.'; return; }
  TOKEN=t; $('loginErr').textContent='Vérification…';
  try{
    await api('state');                                   // valide le token
    localStorage.setItem('navlys_cockpit_token',TOKEN);
    $('loginErr').textContent=''; hideLogin(); start();
  }catch(e){ TOKEN=''; $('loginErr').textContent = String(e.message)==='401'?'Mot de passe incorrect.':'Erreur : '+e.message; }
}
function fillDeptSelect(){
  const sel=$('deptSel');
  Object.keys(AGENT_INFO).forEach(id=>{
    const i=AGENT_INFO[id];
    const o=document.createElement('option'); o.value=id; o.textContent=`${i.emo} ${i.prenom} — ${id}`;
    sel.appendChild(o);
  });
}
function start(){
  refresh();
  if(timer) clearInterval(timer);
  timer=setInterval(refresh,8000);   // direct : rafraîchissement toutes les 8 s
}

// Events
$('loginBtn').addEventListener('click',login);
$('tokenInput').addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });
$('refreshBtn').addEventListener('click',()=>{ refresh(); toast('↻ Rafraîchi'); });
$('logoutBtn').addEventListener('click',()=>logout());
$('briefBtn').addEventListener('click',briefing);
$('sendOrdre').addEventListener('click',sendOrdre);
if('speechSynthesis' in window) window.speechSynthesis.getVoices(); // précharge les voix

// Démarrage
fillDeptSelect();
if(TOKEN) start(); else showLogin();
</script>
